<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Habibi Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --pink: #D4687A; --pink-dark: #B5526A;
      --brown: #3D1A22; --muted: #8A606A;
      --cream: #FDF0F4; --beige: #F8E1E8;
      --border: rgba(212,104,122,0.25);
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; -webkit-font-smoothing: antialiased; }

    /* Background pattern */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L0 30l30 30 30-30z' fill='%23D4687A' fill-opacity='0.035'/%3E%3C/svg%3E");
      background-size: 40px;
    }

    .login-card {
      position: relative; z-index: 1;
      background: #fff; border-radius: 20px; padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(61,26,34,0.15);
      border: 1px solid var(--border);
    }

    .login-brand {
      text-align: center; margin-bottom: 36px;
    }
    .login-brand-logo { height: 52px; width: auto; margin: 0 auto 12px; object-fit: contain; }
    .login-brand-name { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; color: var(--brown); }
    .login-brand-name span { color: var(--pink); }
    .login-brand-sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }

    .login-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-divider span { font-size: 0.72rem; color: var(--muted); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--brown); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.875rem; }
    .form-input {
      width: 100%; padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; color: var(--brown); background: var(--cream);
      font-family: var(--sans); outline: none; transition: all 0.25s ease;
    }
    .form-input:focus { border-color: var(--pink); background: #fff; box-shadow: 0 0 0 3px rgba(212,104,122,0.12); }

    .password-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 0.875rem; transition: color 0.2s;
    }
    .password-toggle:hover { color: var(--pink); }

    .login-options { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--muted); cursor: pointer; }
    .remember input[type="checkbox"] { accent-color: var(--pink); width: 15px; height: 15px; }
    .forgot-link { font-size: 0.82rem; color: var(--pink); font-weight: 500; text-decoration: none; }
    .forgot-link:hover { color: var(--pink-dark); text-decoration: underline; }

    .login-btn {
      width: 100%; padding: 13px; background: var(--pink); color: #fff;
      border: none; border-radius: 100px; font-size: 0.92rem; font-weight: 600;
      font-family: var(--sans); cursor: pointer; transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover:not(:disabled) { background: var(--pink-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,104,122,0.4); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .error-msg {
      display: none; align-items: center; gap: 8px; padding: 11px 14px;
      background: rgba(198,40,40,0.08); border: 1px solid rgba(198,40,40,0.2);
      border-radius: 8px; color: #c62828; font-size: 0.82rem; margin-bottom: 16px;
    }
    .error-msg.show { display: flex; }

    .login-back { text-align: center; margin-top: 24px; font-size: 0.82rem; color: var(--muted); }
    .login-back a { color: var(--pink); font-weight: 500; }
    .login-back a:hover { color: var(--pink-dark); }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <img src="images/logo.png" alt="Habibi Logo" class="login-brand-logo"
           onerror="this.style.display='none'">
      <div class="login-brand-name">Habibi<span>.</span></div>
      <div class="login-brand-sub">Admin Portal</div>
    </div>

    <div class="login-divider"><span>Sign in to continue</span></div>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid email or password.</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="form-input" placeholder="admin@habibiskincare.ph" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="password-toggle" id="togglePw">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="login-options">
        <label class="remember">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="login-back">
      <a href="index.html"><i class="fas fa-arrow-left" style="font-size:0.75rem"></i> Back to Website</a>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // If already logged in, redirect to admin
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'admin/index.html';
    });

    // Password toggle
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      icon.className = pw.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn      = document.getElementById('loginBtn');
      const errBox   = document.getElementById('errorMsg');
      const errText  = document.getElementById('errorText');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      errBox.classList.remove('show');

      try {
        const persistence = remember ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistence);
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'admin/index.html';
      } catch (err) {
        const messages = {
          'auth/user-not-found':   'No account found with this email.',
          'auth/wrong-password':   'Incorrect password. Please try again.',
          'auth/invalid-email':    'Please enter a valid email address.',
          'auth/too-many-requests':'Too many attempts. Please try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        errText.textContent = messages[err.code] || 'Sign in failed. Please try again.';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    });
  </script>
</body>
</html>
